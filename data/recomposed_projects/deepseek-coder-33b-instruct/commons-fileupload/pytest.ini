# pytest.ini

[pytest]
# Require at least this version of pytest
minversion = 5.3.0

markers =
    test: Custom marker for test functions

# Add options to control the pytest output
addopts = --tb=native --no-header --junit-xml=pytest-report.xml

# Define directories to look for tests
testpaths = src/test

python_files = *.py

python_classes = *Test

python_functions = test*